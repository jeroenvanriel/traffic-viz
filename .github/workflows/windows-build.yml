name: Build for Windows

on:
  workflow_dispatch: # manual trigger
  push:
    tags:
      - "v*" # release trigger

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "25"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.\backend[build]'

      - name: Build backend EXE
        working-directory: backend
        run: |
          pyinstaller app.spec

      - name: Copy default scenes
        run: |
          xcopy /E /I scenes backend\dist\scenes

      - name: Zip final folder
        run: |
          powershell Compress-Archive -Path backend/dist/* -DestinationPath traffic-viz.zip

      # Upload artifact only on manual trigger
      - name: Upload artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v5
        with:
          name: traffic-viz
          path: traffic-viz.zip

      # Create release only on tag push
      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: traffic-viz.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
