name: Build Windows EXE

on:
  # manual trigger from web interface
  workflow_dispatch:
  # build when tagging
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "25"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install backend deps
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend EXE
        working-directory: backend
        run: |
          pyinstaller app.spec

      - name: Copy default scenes
        run: |
          xcopy /E /I scenes backend\dist\scenes

      - name: Zip final folder
        run: |
          powershell Compress-Archive -Path backend/dist/* -DestinationPath traffic-viz.zip

      # --------------------------
      # Artifact upload only on manual trigger
      - name: Upload artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v5
        with:
          name: traffic-viz
          path: traffic-viz.zip

      # --------------------------
      # Release only on tag push
      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: traffic-viz.zip
          asset_name: traffic-viz.zip
          asset_content_type: application/zip
